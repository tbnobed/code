services:
  forge:
    build: .
    restart: unless-stopped
    ports:
      # Reachable from any browser on your network at http://<dgx-ip>:3000
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://forge:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/forge
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      # Ollama runs on the DGX host, outside this container
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3-coder-next}
      OLLAMA_ARCHITECT_MODEL: ${OLLAMA_ARCHITECT_MODEL:-qwen3-next:80b-a3b-thinking}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-qwen2.5vl}
      # Optional: "Send for review" (Claude). Feature stays hidden when unset.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_REVIEW_MODEL: ${ANTHROPIC_REVIEW_MODEL:-claude-sonnet-4-6}
      # Optional: local image generation via Stable Diffusion. Point at an
      # AUTOMATIC1111-compatible WebUI launched with --api (usually
      # http://host.docker.internal:7860) or a ComfyUI server (usually
      # http://host.docker.internal:8188). Feature hidden when unset.
      IMAGE_GEN_URL: ${IMAGE_GEN_URL:-}
      IMAGE_GEN_PROVIDER: ${IMAGE_GEN_PROVIDER:-auto}
      IMAGE_GEN_MODEL: ${IMAGE_GEN_MODEL:-}
      IMAGE_GEN_STEPS: ${IMAGE_GEN_STEPS:-20}
      IMAGE_GEN_TIMEOUT_MS: ${IMAGE_GEN_TIMEOUT_MS:-180000}
      # Optional: enables the agent's GitHub push/pull sync (fine-grained PAT
      # with Contents read/write on the repos you want it to touch)
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GIT_USER_NAME: ${GIT_USER_NAME:-}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - workspaces:/data/workspaces
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # /api/healthz is intentionally unauthenticated for this check
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: forge
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  workspaces:
