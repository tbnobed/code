openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Agentic coding agent API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Local authentication
  - name: sessions
    description: Agent session management
  - name: workspace
    description: Session workspace file operations
  - name: models
    description: Available Ollama model operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialsBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out and destroy the session
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialsBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /users/{id}:
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: User deleted
        "400":
          description: Cannot delete this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /users/{id}/password:
    put:
      operationId: resetUserPassword
      tags: [users]
      summary: Reset a user's password (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordBody"
      responses:
        "204":
          description: Password updated
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all agent sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new agent session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionInput"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a session with all messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a session and its workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /sessions/{id}/messages:
    get:
      operationId: listMessages
      tags: [sessions]
      summary: List messages in a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /sessions/{id}/chat:
    post:
      operationId: sendChat
      tags: [sessions]
      summary: Send a user message and stream the agent response via SSE
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "200":
          description: SSE stream of agent events
          content:
            text/event-stream: {}
        "404":
          description: Not found

  /sessions/{id}/files:
    get:
      operationId: listWorkspaceFiles
      tags: [workspace]
      summary: List all files in the session workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of workspace files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceFile"
        "404":
          description: Not found

  /sessions/{id}/file:
    post:
      operationId: readWorkspaceFile
      tags: [workspace]
      summary: Read a file from the session workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilePathInput"
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceFileContent"
        "404":
          description: Not found

  /models:
    get:
      operationId: listModels
      tags: [models]
      summary: List available Ollama models
      responses:
        "200":
          description: Available models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OllamaModel"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Session:
      type: object
      properties:
        userId:
          type: integer
          description: Id of the user who owns this session.
        username:
          type: string
          description: Owner's username — included in list responses so admins can tell whose session it is.
        id:
          type: integer
        title:
          type: string
        model:
          type: string
        workspacePath:
          type: string
        messageCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - model
        - workspacePath
        - messageCount
        - createdAt
        - updatedAt

    SessionInput:
      type: object
      properties:
        title:
          type: string
        model:
          type: string
      required:
        - title

    SessionWithMessages:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
          description: Id of the user who owns this session.
        title:
          type: string
        model:
          type: string
        workspacePath:
          type: string
        messageCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
      required:
        - id
        - title
        - model
        - workspacePath
        - messageCount
        - createdAt
        - updatedAt
        - messages

    Message:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        role:
          type: string
        content:
          type: string
        toolCalls:
          type: ["string", "null"]
        toolCallId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sessionId
        - role
        - content
        - createdAt

    ChatInput:
      type: object
      properties:
        content:
          type: string
        architect:
          type: boolean
          description: Route this turn to the architect (reasoning) model — no tools, thinking streamed as SSE `thinking` events.
      required:
        - content

    FilePathInput:
      type: object
      properties:
        path:
          type: string
      required:
        - path

    WorkspaceFile:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        type:
          type: string
        size:
          type: integer
        modifiedAt:
          type: string
          format: date-time
      required:
        - name
        - path
        - type
        - size
        - modifiedAt

    WorkspaceFileContent:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
        language:
          type: string
      required:
        - path
        - content
        - language

    OllamaModel:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        modifiedAt:
          type: string
          format: date-time
      required:
        - name
        - size
        - modifiedAt

    CredentialsBody:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
        password:
          type: string
          minLength: 8
          maxLength: 256
      required:
        - username
        - password

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        isAdmin:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - isAdmin
        - createdAt

    PasswordBody:
      type: object
      properties:
        password:
          type: string
          minLength: 8
          maxLength: 256
      required:
        - password

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
